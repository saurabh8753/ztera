<style>
body{
margin:0;
font-family:Inter,Arial,sans-serif;
background:linear-gradient(180deg,#eef2ff,#f9fafb);
min-height:100vh;
}

/* popup css same as your previous code */
.install-overlay{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
z-index:9999;
background:linear-gradient(135deg,#1e3a8a,#312e81);
}

.install-box{
width:90%;
max-width:420px;
background:linear-gradient(180deg,#ffffff,#eef2ff);
border-radius:26px;
padding:28px 22px 32px;
text-align:center;
position:relative;
animation:pop .35s ease;
box-shadow:0 30px 70px rgba(0,0,0,.35);
}

@keyframes pop{
from{transform:scale(.9);opacity:0}
to{transform:scale(1);opacity:1}
}

.close-btn{
position:absolute;
top:14px;
right:14px;
background:none;
border:none;
font-size:22px;
cursor:pointer;
color:#334155;
}

.popup-icon{
width:90px;
margin-bottom:16px;
}

.install-box h2{
margin:8px 0 8px;
font-size:26px;
font-weight:900;
background:linear-gradient(90deg,#4f46e5,#2563eb);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.install-box p{
font-size:14px;
color:#475569;
margin-bottom:22px;
line-height:1.5;
}

.popup-install-btn{
width:100%;
background:linear-gradient(90deg,#4f46e5,#2563eb);
color:#fff;
padding:15px;
font-size:18px;
font-weight:800;
border:none;
border-radius:16px;
cursor:pointer;
box-shadow:0 18px 30px rgba(37,99,235,.45);
}

.popup-note{
margin-top:16px;
font-size:12px;
color:#64748b;
}
</style>

</head>

<body>

<!-- SEO Heading -->
<h1 style="display:none">
Ztera Terabox Video Player and Downloader
</h1>

<!-- Install Popup -->
<div id="installOverlay" class="install-overlay">
<div class="install-box">

<button class="close-btn" id="closePopup">✕</button>

<img src="https://www.ztera.fun/icon.png"
alt="Ztera App"
class="popup-icon">

<h2>Install Ztera App</h2>

<p>
Fast • Lightweight • All Video Player & Downloader
<br>Best experience on Google Chrome (Android)
</p>

<button id="popupInstallBtn" class="popup-install-btn">
📲 Install Now
</button>

<div class="popup-note">
No Play Store • One-tap install
</div>

</div>
</div>

<script>

let deferredPrompt=null;

const overlay=document.getElementById("installOverlay");
const installBtn=document.getElementById("popupInstallBtn");
const closeBtn=document.getElementById("closePopup");

const TRACK_API="https://admin.yaartunah.workers.dev/?action=track&type=";

if("serviceWorker" in navigator){
navigator.serviceWorker.register("/sw.js");
}

window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt=e;

setTimeout(()=>{
overlay.style.display="flex";
},1000);

});

installBtn.addEventListener("click",async()=>{

if(!deferredPrompt){
alert("Open Chrome menu → Add to Home Screen");
return;
}

navigator.sendBeacon(TRACK_API+"install");

deferredPrompt.prompt();
await deferredPrompt.userChoice;

overlay.style.display="none";
deferredPrompt=null;

});

closeBtn.addEventListener("click",()=>{
overlay.style.display="none";
});

</script>

</body>
</html>
