<script>
// ========== TRACKING FUNCTION (FIXED) ==========
const TRACK_BASE = "https://admin.yaartunah.workers.dev/";

function trackEvent(eventType) {
  const url = `${TRACK_BASE}?action=track&type=${eventType}&t=${Date.now()}`;
  fetch(url, {
    method: 'GET',
    mode: 'no-cors',
    cache: 'no-cache'
  }).catch(err => console.debug('track:', eventType));
}

// ========== PRESERVE EXISTING SCRIPT ==========
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}

/* TRACK visit */
trackEvent('visit');

// ─────────────── ADS DELAY (5 seconds) ───────────────
setTimeout(() => {
  const adsContainer = document.getElementById('adsCreditContainer');
  if (adsContainer) {
    adsContainer.style.display = 'block';
    trackEvent('ads_shown');
  }
}, 5000);

// ─────────────── PWA INSTALL HANDLER WITH DELAYED PROMPT FIX ───────────────
let deferredPrompt = null;
let pendingInstallRequest = false;   // flag to trigger prompt when ready

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  console.log('✅ beforeinstallprompt captured');

  if (pendingInstallRequest) {
    pendingInstallRequest = false;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then((choiceResult) => {
      if (choiceResult.outcome === 'accepted') {
        console.log('User accepted the delayed install prompt');
        trackEvent('pwa_install_accepted_delayed');
      }
      deferredPrompt = null;
    });
  }
});

// ─────────────── APP INSTALL POPUP LOGIC (FIXED) ───────────────
(function() {
  // ✅ FIX: Do not show the install popup if already in PWA standalone mode
  if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) {
    return; // PWA is already installed → exit, no popup
  }

  const popupOverlay = document.getElementById('appPopup');
  const closeBtn = document.getElementById('closePopupBtn');
  const installBtn = document.getElementById('installAppLink');

  let popupShown = false;

  // Show popup after 7 seconds (only if not already shown/closed)
  setTimeout(() => {
    if (!popupShown) {
      popupOverlay.classList.add('show');
      popupShown = true;
      trackEvent('app_popup_shown');
    }
  }, 7000);

  // Close button
  closeBtn.addEventListener('click', () => {
    popupOverlay.classList.remove('show');
    trackEvent('app_popup_closed');
  });

  // Click outside card to close
  popupOverlay.addEventListener('click', (e) => {
    if (e.target === popupOverlay) {
      popupOverlay.classList.remove('show');
      trackEvent('app_popup_closed_outside');
    }
  });

  // Install button – now works on first click even if prompt is delayed
  installBtn.addEventListener('click', async () => {
    trackEvent('app_popup_install_click');

    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log(`Install prompt outcome: ${outcome}`);
      if (outcome === 'accepted') {
        trackEvent('pwa_install_accepted');
      }
      deferredPrompt = null;
    } else {
      pendingInstallRequest = true;
      console.log('⏳ Install prompt not yet available, waiting for beforeinstallprompt...');
      alert('📲 Tap "Install" in the upcoming browser prompt to add Ztera to your home screen.');
    }

    popupOverlay.classList.remove('show');
  });

})();
</script>
